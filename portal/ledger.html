<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
<script src="js/auth-guard.js"></script>`n</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item active"><i class="fas fa-book"></i> Ledger</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="staff.html" class="nav-item"><i class="fas fa-user-shield"></i> Staff Accounts</a>`n                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-wrapper">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Ledger & Accounts</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="card">
                    <div class="section-header">
                        <h3>General Ledger</h3>
                        <button class="btn btn-outline"><i class="fas fa-filter"></i> Filter</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Entry ID</th>
                                    <th>Date</th>
                                    <th>Client / Description</th>
                                    <th>Type</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <tbody id="ledgerTableBody">
                                <!-- Entries will load here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tableBody = document.getElementById("ledgerTableBody");
            let ledger = JSON.parse(localStorage.getItem("aat_ledger")) || [];

            if (ledger.length > 0) {
                // Sort by newest first assuming appended chronologically
                ledger.reverse().forEach(entry => {
                    let badgeClass = "bg-success-light";
                    if (entry.type === "Expense" || entry.type === "ticket_sale_refund") {
                        badgeClass = "bg-danger-light";
                    }

                    // Handle missing/legacy keys gracefully
                    let clientDisplay = entry.client_name ? `<strong>${entry.client_name}</strong><br>` : '';
                    let descDisplay = entry.description || 'No description';

                    tableBody.innerHTML += `
                        <tr>
                            <td>${entry.entry_id || entry.id || '#---'}</td>
                            <td>${entry.date || '-'}</td>
                            <td>
                                ${clientDisplay}
                                <span class="text-muted" style="font-size: 0.8rem;">${descDisplay}</span>
                            </td>
                            <td><span class="status-badge ${badgeClass}">${entry.type}</span></td>
                            <td>Rs ${(entry.amount || 0).toLocaleString()}</td>
                        </tr>
                    `;
                });
            } else {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 32px;">No transactions recorded yet.</td></tr>`;
            }
        });

        function logout() {
            localStorage.removeItem("portal_logged_in");
            window.location.href = "login.html";
        }
    </script>
<script src="js/global-search.js"></script>`n</body>

</html>

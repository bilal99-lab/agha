<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Payments - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
    <script src="js/auth-guard.js"></script>`n
</head>

<body data-page="supplier-payments">

    <div class="wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="suppliers.html" class="nav-item"><i class="fas fa-building"></i> Suppliers</a>
                <a href="supplier-payments.html" class="nav-item active"><i class="fas fa-money-check-alt"></i> Supplier
                    Payments</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="staff.html" class="nav-item"><i class="fas fa-user-shield"></i> Staff Accounts</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="backup.html" class="nav-item"><i class="fas fa-database"></i> Backup & Restore</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Supplier Payments</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div id="alertMessage" class="alert" style="display: none; margin-bottom: 24px;"></div>

                <div class="card" style="margin-bottom: 24px;">
                    <div class="section-header">
                        <h3>Record Payment</h3>
                    </div>
                    <form id="paymentForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Select Supplier *</label>
                                <select id="supplierSelect" class="form-control" required>
                                    <option value="" disabled selected>Loading...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Payment Amount (PKR) *</label>
                                <input type="number" id="paymentAmount" class="form-control" required min="1">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Date *</label>
                                <input type="date" id="paymentDate" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Note / Reference</label>
                                <input type="text" id="paymentNote" class="form-control"
                                    placeholder="e.g. Bank Transfer TXN-123">
                            </div>
                        </div>
                        <div style="text-align: right; margin-top: 16px;">
                            <button type="submit" class="btn"><i class="fas fa-check-circle"></i> Submit
                                Payment</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <div class="section-header">
                        <h3>Payables Overview</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Supplier Name</th>
                                    <th>Airline</th>
                                    <th>Total Billed</th>
                                    <th>Amount Paid</th>
                                    <th>Balance Remaining</th>
                                </tr>
                            </thead>
                            <tbody id="suppliersTableBody">
                                <!-- Entries will load here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tableBody = document.getElementById("suppliersTableBody");
            const selectDropdown = document.getElementById("supplierSelect");
            const paymentForm = document.getElementById("paymentForm");
            const alertBox = document.getElementById("alertMessage");

            // Set default date
            document.getElementById('paymentDate').valueAsDate = new Date();

            function renderData() {
                let suppliers = JSON.parse(localStorage.getItem("aat_suppliers")) || [];

                tableBody.innerHTML = "";
                selectDropdown.innerHTML = '<option value="" disabled selected>Select Supplier</option>';

                if (suppliers.length > 0) {
                    suppliers.sort((a, b) => (b.balance_payable || 0) - (a.balance_payable || 0)).forEach(s => {
                        let totalBilled = s.total_cost || 0;
                        let balanceRemaining = s.balance_payable || 0;

                        // Default compatibility mapping if amount_paid is natively missing
                        let amountPaid = s.amount_paid !== undefined ? s.amount_paid : (totalBilled - balanceRemaining);

                        // Table row
                        tableBody.innerHTML += `
                            <tr>
                                <td style="font-weight: 600;">${s.supplier_name}</td>
                                <td>${s.airline || '-'}</td>
                                <td>Rs ${totalBilled.toLocaleString()}</td>
                                <td style="color: var(--success); font-weight: 600;">Rs ${amountPaid.toLocaleString()}</td>
                                <td style="color: var(--danger); font-weight: 600;">Rs ${balanceRemaining.toLocaleString()}</td>
                            </tr>
                        `;

                        // Dropdown option (Only include if they owe money)
                        if (balanceRemaining > 0) {
                            selectDropdown.innerHTML += `<option value="${s.supplier_name}">${s.supplier_name} (Owes: Rs ${balanceRemaining.toLocaleString()})</option>`;
                        }
                    });
                } else {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 32px;">No suppliers recorded yet.</td></tr>`;
                    selectDropdown.innerHTML = '<option value="" disabled>No suppliers found</option>';
                }
            }

            renderData();

            paymentForm.addEventListener('submit', function (e) {
                e.preventDefault();
                let suppliers = JSON.parse(localStorage.getItem("aat_suppliers")) || [];
                let ledger = JSON.parse(localStorage.getItem("aat_ledger")) || [];

                let selectedName = selectDropdown.value;
                let amount = parseFloat(document.getElementById('paymentAmount').value);
                let date = document.getElementById('paymentDate').value;
                let note = document.getElementById('paymentNote').value;

                let supIndex = suppliers.findIndex(s => s.supplier_name === selectedName);
                if (supIndex !== -1) {
                    let s = suppliers[supIndex];
                    let currentBalance = s.balance_payable || 0;

                    if (amount > currentBalance) {
                        alertBox.textContent = `Error: Payment amount (Rs ${amount}) cannot exceed the balance due (Rs ${currentBalance}).`;
                        alertBox.className = 'alert alert-danger';
                        alertBox.style.display = 'block';
                        return;
                    }

                    // Update supplier
                    s.balance_payable = currentBalance - amount;
                    s.amount_paid = (s.amount_paid || (s.total_cost - currentBalance)) + amount;
                    localStorage.setItem("aat_suppliers", JSON.stringify(suppliers));

                    // Add to ledger
                    ledger.push({
                        entry_id: "PAY-" + Date.now(),
                        type: "Supplier Payment",
                        amount: amount,
                        client_name: selectedName,
                        description: note || "Supplier Payment",
                        date: date
                    });
                    localStorage.setItem("aat_ledger", JSON.stringify(ledger));

                    // Reset
                    paymentForm.reset();
                    document.getElementById('paymentDate').valueAsDate = new Date();
                    renderData();

                    alertBox.textContent = `Payment of Rs ${amount.toLocaleString()} successfully recorded for ${selectedName}.`;
                    alertBox.className = 'alert alert-success';
                    alertBox.style.display = 'block';
                    setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
                }
            });
        });

        function logout() {
            localStorage.removeItem("portal_logged_in");
            window.location.href = "login.html";
        }
    </script>
    <script src="js/global-search.js"></script>`n

<script src="../assets/js/portal.js"></script>
</body>

</html>

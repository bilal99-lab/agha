<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Payments - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
    <script src="js/auth-guard.js"></script>
</head>

<body data-page="supplierPayments">

    <div class="portal-wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="suppliers.html" class="nav-item"><i class="fas fa-building"></i> Suppliers</a>
                <a href="supplier-payments.html" class="nav-item active"><i class="fas fa-money-check-alt"></i> Supplier
                    Payments</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="staff.html" class="nav-item"><i class="fas fa-user-shield"></i> Staff Accounts</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="backup.html" class="nav-item"><i class="fas fa-database"></i> Backup & Restore</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-area">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Supplier Payments</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div id="alertMessage" class="alert" style="display: none; margin-bottom: 24px;"></div>

                <div class="card" style="margin-bottom: 24px;">
                    <div class="section-header">
                        <h3>Record Payment</h3>
                    </div>
                    <form id="paymentForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Select Supplier *</label>
                                <select id="supplierSelect" class="form-control" required>
                                    <option value="" disabled selected>Loading...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Payment Amount (PKR) *</label>
                                <input type="number" id="paymentAmount" class="form-control" required min="1">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Date *</label>
                                <input type="date" id="paymentDate" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Note / Reference</label>
                                <input type="text" id="paymentNote" class="form-control"
                                    placeholder="e.g. Bank Transfer TXN-123">
                            </div>
                        </div>
                        <div style="text-align: right; margin-top: 16px;">
                            <button type="submit" class="btn"><i class="fas fa-check-circle"></i> Submit
                                Payment</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <div class="section-header">
                        <h3>Payables Overview</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Supplier Name</th>
                                    <th>Airline</th>
                                    <th>Total Billed</th>
                                    <th>Amount Paid</th>
                                    <th>Balance Remaining</th>
                                </tr>
                            </thead>
                            <tbody id="suppliersTableBody">
                                <!-- Entries will load here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="js/global-search.js"></script>
    <script src="../assets/js/portal.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Portal CSS -->
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <h2>AAT Portal</h2>
            </div>

            <div id="loginError" class="alert alert-error" style="display: none; margin-bottom: 20px;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required
                        autofocus>
                </div>

                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password"
                        required>
                </div>
                <button type="submit" class="btn login-btn">Sign In to Portal</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const loginError = document.getElementById("loginError");

            // Redirect if already logged in
            if (localStorage.getItem("isLoggedIn") === "true") {
                window.location.href = "dashboard.html";
            }

            loginForm.addEventListener("submit", (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                if (email === "admin@aat.com" && password === "123456") {
                    localStorage.setItem("isLoggedIn", "true");
                    window.location.href = "dashboard.html";
                } else {
                    loginError.textContent = "Invalid email or password.";
                    loginError.style.display = "block";
                }
            });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Portal CSS -->
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-plane"></i>
                </div>
                <h2>AAT Admin Portal</h2>
                <p>Secure access to the travel management system</p>
            </div>

            <div id="loginError" class="alert alert-error" style="display: none; margin-bottom: 20px;"></div>

            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label" style="color: #334155;">Email Address</label>
                    <input type="email" id="loginEmail" class="login-input" placeholder="admin@aat.com" required
                        autofocus>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label" style="color: #334155;">Password</label>
                    <input type="password" id="loginPassword" class="login-input" placeholder="Enter secure password"
                        required>
                </div>
                <button type="submit" class="login-btn">Access Portal</button>
            </form>

            <div class="login-footer">
                Agha Air Travel &bull; Internal System
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const loginError = document.getElementById("loginError");
            // Redirect if already logged in
            if (localStorage.getItem("portal_logged_in") === "true") {
                window.location.href = "dashboard.html";
            }

            document.getElementById('loginForm').addEventListener('submit', function (e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();

                if (email === "admin@aat.com" && pass === "123456") {
                    localStorage.setItem('portal_logged_in', 'true');
                    window.location.href = "dashboard.html";
                } else {
                    loginError.textContent = 'Invalid email or password';
                    loginError.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Portal CSS -->
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-plane"></i>
                </div>
                <h2>AAT Admin Portal</h2>
                <p>Secure access to the travel management system</p>
            </div>

            <div id="loginError" class="alert alert-error" style="display: none; margin-bottom: 20px;"></div>

            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label" style="color: #334155;">Email Address</label>
                    <input type="email" id="email" class="login-input" placeholder="admin@aat.com" required autofocus>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label" style="color: #334155;">Password</label>
                    <input type="password" id="password" class="login-input" placeholder="Enter secure password"
                        required>
                </div>
                <button type="submit" class="login-btn">Access Portal</button>
            </form>

            <div class="login-footer">
                Agha Air Travel &bull; Internal System
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const loginError = document.getElementById("loginError");
            // Redirect if already logged in
            if (localStorage.getItem("portal_logged_in") === "true") {
                window.location.href = "dashboard.html";
            }

            document.getElementById('loginForm').addEventListener('submit', function (e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const pass = document.getElementById('password').value.trim();
                const alertBox = document.getElementById('alertMsg');

                // Initialize Staff if empty
                let staffList = JSON.parse(localStorage.getItem('aat_staff')) || [];
                if (staffList.length === 0) {
                    staffList.push({
                        staff_id: 'STAFF-1',
                        name: 'System Admin',
                        email: 'admin@aat.com',
                        role: 'Admin',
                        password: '123'
                    });
                    localStorage.setItem('aat_staff', JSON.stringify(staffList));
                }

                const user = staffList.find(s => s.email === email && s.password === pass);

                if (user) {
                    if (user.status === 'Disabled') {
                        alertBox.textContent = 'Account depends on admin approval. Disabled.';
                        alertBox.style.display = 'block';
                        return;
                    }

                    // Login Success
                    localStorage.setItem('portal_logged_in', 'true');
                    localStorage.setItem('portal_logged_in_user', JSON.stringify(user));

                    // Animate success
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = 'Login successful. Redirecting...';
                    alertBox.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 800);
                } else {
                    alertBox.textContent = 'Invalid email or password.';
                    alertBox.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="suppliers.html" class="nav-item active"><i class="fas fa-building"></i> Suppliers</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-wrapper">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Supplier Ledger</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="card">
                    <div class="section-header">
                        <h3>All Suppliers</h3>
                        <button class="btn btn-outline"><i class="fas fa-file-export"></i> Export</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Supplier Name</th>
                                    <th>Airline</th>
                                    <th>Total Tickets</th>
                                    <th>Total Cost</th>
                                    <th>Balance Payable</th>
                                </tr>
                            </thead>
                            <tbody id="suppliersTableBody">
                                <!-- Entries will load here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tableBody = document.getElementById("suppliersTableBody");
            let suppliers = JSON.parse(localStorage.getItem("aat_suppliers")) || [];

            if (suppliers.length > 0) {
                // Sort by balance payable descending
                suppliers.sort((a, b) => (b.balance_payable || 0) - (a.balance_payable || 0)).forEach(s => {
                    tableBody.innerHTML += `
                        <tr>
                            <td style="font-weight: 600;">${s.supplier_name}</td>
                            <td>${s.airline || '-'}</td>
                            <td>${s.total_tickets || 0} Tickets</td>
                            <td>Rs ${(s.total_cost || 0).toLocaleString()}</td>
                            <td style="color: var(--danger); font-weight: 600;">Rs ${(s.balance_payable || 0).toLocaleString()}</td>
                        </tr>
                    `;
                });
            } else {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 32px;">No suppliers recorded yet.</td></tr>`;
            }
        });

        function logout() {
            localStorage.removeItem("portal_logged_in");
            window.location.href = "login.html";
        }
    </script>
</body>

</html>

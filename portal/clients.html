<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("portal_logged_in");
            window.location.href = "login.html";
        }
    </script>
    <script src="js/auth-guard.js"></script>
</head>

<body data-page="clients">

    <div class="portal-wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item active"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="staff.html" class="nav-item"><i class="fas fa-user-shield"></i> Staff Accounts</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-area">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Client Directory</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area" style="position: relative;">
                <div id="clientAlert" class="alert" style="display: none; margin-bottom: 24px;"></div>
                <div class="card">
                    <div class="section-header">
                        <h3>All Clients</h3>
                        <button class="btn" id="addClientBtn"><i class="fas fa-plus"></i> Add New Client</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Total Tickets</th>
                                    <th>Total Spent</th>
                                    <th>Status</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="clientsTableBody">
                                <!-- Populated dynamically by portal.js -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add Client Modal -->
                <div id="clientModal"
                    style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
                    <div class="card"
                        style="width: 100%; max-width: 500px; padding: 32px; animation: fadeUpIn 0.3s ease;">
                        <h3 style="margin-bottom: 24px;">Add New Client</h3>
                        <form id="newClientForm">
                            <div class="form-group" style="margin-bottom: 16px;">
                                <label class="form-label">Client Name *</label>
                                <input type="text" id="newClientName" class="form-control" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 16px;">
                                <label class="form-label">Phone Number *</label>
                                <input type="text" id="newClientPhone" class="form-control" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 24px;">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="newClientEmail" class="form-control">
                            </div>
                            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                                <button type="button" id="cancelClientBtn" class="btn btn-outline">Cancel</button>
                                <button type="submit" id="saveClientBtn" class="btn"><i class="fas fa-save"></i> Save
                                    Client</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="js/global-search.js"></script>
    <script src="../assets/js/portal.js"></script>
</body>

</html>

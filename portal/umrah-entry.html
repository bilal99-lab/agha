<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umrah Entry - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
    <script src="js/auth-guard.js"></script>`n
</head>

<body data-page="umrah">

    <div class="wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="umrah-entry.html" class="nav-item active"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="staff.html" class="nav-item"><i class="fas fa-user-shield"></i> Staff Accounts</a>`n <a
                    href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Umrah Entry</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="card">
                    <div class="section-header">
                        <h3>New Umrah Package Record</h3>
                        <button class="btn btn-save" id="btnSaveUmrah"><i class="fas fa-save"></i> Save Entry</button>
                    </div>

                    <form id="umrahForm">
                        <div id="umrahAlert" class="alert" style="display: none; margin-bottom: 24px;"></div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Client Name *</label>
                                <input type="text" id="umrahClient" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone Number *</label>
                                <input type="text" id="umrahPhone" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Passport Number</label>
                                <input type="text" id="umrahPassport" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Package Name *</label>
                                <input type="text" id="umrahPackage" class="form-control"
                                    placeholder="e.g. 15 Days Star Package" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Travel Date *</label>
                                <input type="date" id="umrahDate" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Cost Price (Rs) *</label>
                                <input type="number" id="umrahCost" class="form-control" value="0" min="0" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Selling Price (Rs) *</label>
                                <input type="number" id="umrahSelling" class="form-control" value="0" min="0" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Profit (Rs)</label>
                                <input type="text" id="umrahProfit" class="form-control" readonly
                                    style="background: #f8fafc; font-weight: 600;">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script>
        function logout() {
            localStorage.removeItem("portal_logged_in");
            window.location.href = "login.html";
        }
    </script>
    <script src="js/global-search.js"></script>`n

<script src="../assets/js/portal.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
    <script src="js/auth-guard.js"></script>
</head>

<body data-page="reports">

    <div class="portal-wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="suppliers.html" class="nav-item"><i class="fas fa-building"></i> Suppliers</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="reports.html" class="nav-item active"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-area">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Automated Reports</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">

                <div class="card" style="margin-bottom: 24px;">
                    <div class="section-header">
                        <h3>Generate Monthly Report</h3>
                    </div>
                    <div class="form-grid" style="align-items: end;">
                        <div class="form-group">
                            <label class="form-label">Select Month</label>
                            <input type="month" id="reportMonth" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <button class="btn" id="btnGenerate" style="width: 100%;"><i class="fas fa-sync"></i>
                                Generate Analytics</button>
                        </div>
                    </div>
                </div>

                <!-- Report Results Wrapper -->
                <div id="reportResults" style="display: none;">

                    <div class="stats-grid" style="margin-bottom: 24px;">
                        <div class="card stat-card">
                            <div class="stat-info">
                                <h4>Monthly Sales</h4>
                                <div class="value" id="repSales">Rs 0</div>
                            </div>
                        </div>
                        <div class="card stat-card c-success">
                            <div class="stat-info">
                                <h4>Gross Profit</h4>
                                <div class="value" id="repProfit">Rs 0</div>
                            </div>
                        </div>
                        <div class="card stat-card c-danger">
                            <div class="stat-info">
                                <h4>Total Expenses</h4>
                                <div class="value" id="repExpenses">Rs 0</div>
                            </div>
                        </div>
                        <div class="card stat-card" style="border-left: 4px solid #8b5cf6;">
                            <div class="stat-info">
                                <h4 style="color: #64748b;">Net Profit</h4>
                                <div class="value" id="repNetProfit" style="color: #8b5cf6;">Rs 0</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <!-- Top Routes -->
                        <div class="card">
                            <div class="section-header" style="margin-bottom: 16px;">
                                <h3>Top Routes Sold</h3>
                            </div>
                            <div id="repRoutesList">
                                <!-- injected -->
                            </div>
                        </div>

                        <!-- Top Clients -->
                        <div class="card">
                            <div class="section-header" style="margin-bottom: 16px;">
                                <h3>Top Clients (By Revenue)</h3>
                            </div>
                            <div id="repClientsList">
                                <!-- injected -->
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="js/global-search.js"></script>
    <script src="../assets/js/portal.js"></script>
</body>

</html>

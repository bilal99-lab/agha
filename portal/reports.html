<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">

    <script>
        // Auth Guard
        if (localStorage.getItem("portal_logged_in") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="suppliers.html" class="nav-item"><i class="fas fa-building"></i> Suppliers</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="reports.html" class="nav-item active"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-wrapper">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Automated Reports</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">

                <div class="card" style="margin-bottom: 24px;">
                    <div class="section-header">
                        <h3>Generate Monthly Report</h3>
                    </div>
                    <div class="form-grid" style="align-items: end;">
                        <div class="form-group">
                            <label class="form-label">Select Month</label>
                            <input type="month" id="reportMonth" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <button class="btn" id="btnGenerate" style="width: 100%;"><i class="fas fa-sync"></i>
                                Generate Analytics</button>
                        </div>
                    </div>
                </div>

                <!-- Report Results Wrapper -->
                <div id="reportResults" style="display: none;">

                    <div class="stats-grid" style="margin-bottom: 24px;">
                        <div class="card stat-card">
                            <div class="stat-info">
                                <h4>Monthly Sales</h4>
                                <div class="value" id="repSales">Rs 0</div>
                            </div>
                        </div>
                        <div class="card stat-card c-success">
                            <div class="stat-info">
                                <h4>Gross Profit</h4>
                                <div class="value" id="repProfit">Rs 0</div>
                            </div>
                        </div>
                        <div class="card stat-card c-danger">
                            <div class="stat-info">
                                <h4>Total Expenses</h4>
                                <div class="value" id="repExpenses">Rs 0</div>
                            </div>
                        </div>
                        <div class="card stat-card" style="border-left: 4px solid #8b5cf6;">
                            <div class="stat-info">
                                <h4 style="color: #64748b;">Net Profit</h4>
                                <div class="value" id="repNetProfit" style="color: #8b5cf6;">Rs 0</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <!-- Top Routes -->
                        <div class="card">
                            <div class="section-header" style="margin-bottom: 16px;">
                                <h3>Top Routes Sold</h3>
                            </div>
                            <div id="repRoutesList">
                                <!-- injected -->
                            </div>
                        </div>

                        <!-- Top Clients -->
                        <div class="card">
                            <div class="section-header" style="margin-bottom: 16px;">
                                <h3>Top Clients (By Revenue)</h3>
                            </div>
                            <div id="repClientsList">
                                <!-- injected -->
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Default to current month
            document.getElementById('reportMonth').value = new Date().toISOString().slice(0, 7);

            document.getElementById('btnGenerate').addEventListener('click', generateReport);

            function generateReport() {
                const monthVal = document.getElementById('reportMonth').value;
                if (!monthVal) return;

                const selectedDate = new Date(monthVal + "-01");
                const shortMonth = selectedDate.toLocaleDateString('en-GB', { month: 'short' }); // "Nov"
                const yyyy_mm = monthVal; // "YYYY-MM"

                let tickets = JSON.parse(localStorage.getItem("aat_tickets")) || [];
                let invoices = JSON.parse(localStorage.getItem("aat_invoices")) || [];
                let expenses = JSON.parse(localStorage.getItem("aat_expenses")) || [];

                let mSales = 0;
                let mProfit = 0;
                let mExpenses = 0;

                // Filter Tickets for Top Routes & Clients
                let periodTickets = tickets.filter(t => t.date && t.date.includes(shortMonth));

                // Calculate Sales & Profit from Invoices for structured accuracy
                invoices.forEach(inv => {
                    if (inv.date && inv.date.includes(shortMonth)) {
                        mSales += parseFloat(inv.amount || inv.selling_price || 0);
                        mProfit += parseFloat(inv.profit || 0);
                    }
                });

                expenses.forEach(exp => {
                    if (exp.date && exp.date.startsWith(yyyy_mm)) {
                        mExpenses += parseFloat(exp.amount || 0);
                    }
                });

                let netProfit = mProfit - mExpenses;

                // Render Financials
                document.getElementById('repSales').textContent = "Rs " + mSales.toLocaleString();

                document.getElementById('repProfit').innerHTML = `<span class="status-badge ${mProfit >= 0 ? 'bg-success-light' : 'bg-danger-light'}" style="font-size: 1.1rem; padding: 4px 12px;">Rs ${mProfit.toLocaleString()}</span>`;

                document.getElementById('repExpenses').textContent = "Rs " + mExpenses.toLocaleString();

                document.getElementById('repNetProfit').innerHTML = `<span class="status-badge ${netProfit >= 0 ? 'bg-success-light' : 'bg-danger-light'}" style="color: ${netProfit >= 0 ? '#8b5cf6' : 'var(--danger)'}; font-size: 1.1rem; padding: 4px 12px;">Rs ${netProfit.toLocaleString()}</span>`;

                // Calculate Top Routes
                let routeCounts = {};
                periodTickets.forEach(t => {
                    let route = t.route || t.outbound || "Unknown Route";
                    routeCounts[route] = (routeCounts[route] || 0) + 1;
                });

                let sortedRoutes = Object.keys(routeCounts).map(r => ({ route: r, count: routeCounts[r] })).sort((a, b) => b.count - a.count).slice(0, 5);

                let routesHtml = '';
                if (sortedRoutes.length > 0) {
                    sortedRoutes.forEach((r, idx) => {
                        routesHtml += `<div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9;">
                            <div style="font-weight: 500; color: #0f172a;"><span style="color: #94a3b8; margin-right: 8px;">#${idx + 1}</span> ${r.route}</div>
                            <div style="font-weight: 600; color: #2563eb;">${r.count} <span style="font-size: 0.8rem; font-weight: 500; color: #64748b;">Sold</span></div>
                        </div>`;
                    });
                } else {
                    routesHtml = `<div style="text-align: center; color: var(--text-muted); padding: 20px;">No routes sold this month.</div>`;
                }
                document.getElementById('repRoutesList').innerHTML = routesHtml;

                // Calculate Top Clients (by invoice revenue this month)
                let clientRevenue = {};
                invoices.forEach(inv => {
                    if (inv.date && inv.date.includes(shortMonth)) {
                        let cName = inv.client_name || "Unknown Client";
                        clientRevenue[cName] = (clientRevenue[cName] || 0) + parseFloat(inv.amount || inv.selling_price || 0);
                    }
                });

                let sortedClients = Object.keys(clientRevenue).map(c => ({ client: c, revenue: clientRevenue[c] })).sort((a, b) => b.revenue - a.revenue).slice(0, 5);

                let clientsHtml = '';
                if (sortedClients.length > 0) {
                    sortedClients.forEach((c, idx) => {
                        clientsHtml += `<div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9;">
                            <div style="font-weight: 500; color: #0f172a;"><span style="color: #94a3b8; margin-right: 8px;">#${idx + 1}</span> ${c.client}</div>
                            <div style="font-weight: 600; color: #16a34a;">Rs ${c.revenue.toLocaleString()}</div>
                        </div>`;
                    });
                } else {
                    clientsHtml = `<div style="text-align: center; color: var(--text-muted); padding: 20px;">No clients served this month.</div>`;
                }
                document.getElementById('repClientsList').innerHTML = clientsHtml;

                // Display Results
                document.getElementById('reportResults').style.display = 'block';
            }

            // Auto generate initial
            generateReport();
        });

        function logout() {
            localStorage.removeItem("portal_logged_in");
            window.location.href = "login.html";
        }
    </script>
</body>

</html>
